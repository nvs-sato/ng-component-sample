<div class="page">
  <h1>AG Grid サンプル（日本仕様）</h1>
  <p>受注明細は行を展開して確認できます（受注日列の左側アイコン）。</p>
  <div class="toolbar-actions">
    <button type="button" class="btn btn-sm">グラフ表示</button>
    <button type="button" class="btn btn-primary btn-sm" (click)="moveToRegister()">新規</button>
    <button type="button" class="btn btn-sm" [disabled]="selectedRowCount > 1">修正</button>
    <button type="button" class="btn btn-sm" [disabled]="selectedRowCount > 1">複写</button>
    <button type="button" class="btn btn-sm">削除</button>
    <button type="button" class="btn btn-sm">...</button>

    <span class="toolbar-spacer"></span>

    <button type="button" class="btn btn-sm" (click)="moveToIkkatsu()">一括登録</button>
    <div class="dropdown dropdown-bottom">
      <div tabindex="0" role="button" class="btn btn-sm">データ出力</div>
      <ul tabindex="0" class="dropdown-content z-[1] menu p-2 shadow bg-base-100 rounded-box w-40">
        <li><a (click)="exportAsCsv()">CSV出力</a></li>
        <li><a (click)="exportAsExcelTable()">Excel出力</a></li>
      </ul>
    </div>
    <button type="button" class="btn btn-sm">帳票発行</button>
  </div>

  <p *ngIf="isLoading" class="loading-text">データを読み込み中です...</p>

  <ag-grid-angular
    [class]="gridThemeClass"
    [columnDefs]="columnDefs"
    [rowData]="rowData"
    [defaultColDef]="defaultColDef"
    [pagination]="true"
    [paginationPageSize]="100"
    [localeText]="localeText"
    [getContextMenuItems]="getContextMenuItems"
    [masterDetail]="true"
    [detailCellRendererParams]="detailCellRendererParams"
    [isRowMaster]="isRowMaster"
    [sideBar]="sideBar"
    [enableRangeSelection]="isRangeSelectionMode"
    [rowSelection]="rowSelection"
    [defaultExcelExportParams]="defaultExcelExportParams"
    (gridReady)="onGridReady($event)"
    (selectionChanged)="onSelectionChanged()"
    (rangeSelectionChanged)="onRangeSelectionChanged()"
    (rowDoubleClicked)="onRowDoubleClicked($event)"
    (cellKeyDown)="onCellKeyDown($event)"
    [defaultCsvExportParams]="{
      columnKeys: ['jyucyuNo', 'jyucyuDate']
    }"
    [defaultExcelExportParams]="{
      columnKeys: ['jyucyuNo', 'jyucyuDate']
    }"
  ></ag-grid-angular>
</div>

<app-torihikisaki-popup></app-torihikisaki-popup>
