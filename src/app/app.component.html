<div class="drawer lg:drawer-open app-shell">
  <input id="app-drawer" type="checkbox" class="drawer-toggle" />

  <div class="drawer-content">
    <div class="topbar">
      <label for="app-drawer" class="btn btn-sm drawer-button lg:hidden">メニュー</label>
      <h1 class="title">受注管理</h1>
    </div>
    <div class="px-4 pt-3">
      <div class="breadcrumbs text-sm">
        <ul>
          <li *ngFor="let crumb of breadcrumbs; let isLast = last">
            <a *ngIf="!isLast" [routerLink]="crumb.url">{{ crumb.label }}</a>
            <span *ngIf="isLast">{{ crumb.label }}</span>
          </li>
        </ul>
      </div>
    </div>
    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>

  <div class="drawer-side">
    <label for="app-drawer" aria-label="close sidebar" class="drawer-overlay"></label>
    <ul class="menu p-4 w-72 min-h-full bg-base-200 text-base-content">
      <li><a routerLink="/jyucyu/register" routerLinkActive="active">受注登録</a></li>
      <li><a routerLink="/jyucyu/list" routerLinkActive="active">受注一覧</a></li>
      <li><a routerLink="/jyucyu/ikkatsu" routerLinkActive="active">受注一括登録</a></li>
      <li>
        <details open>
          <summary>コンポーネント</summary>
          <ul>
            <li><a routerLink="/component/date-input" routerLinkActive="active">日付入力</a></li>
            <li><a routerLink="/component/year-month-input" routerLinkActive="active">年月入力</a></li>
            <li><a routerLink="/component/date-range" routerLinkActive="active">日付範囲</a></li>
            <li><a routerLink="/component/year-month-range" routerLinkActive="active">年月範囲</a></li>
            <li><a routerLink="/component/list-box" routerLinkActive="active">リストボックス</a></li>
            <li><a routerLink="/component/tab-panel" routerLinkActive="active">タブパネル</a></li>
            <li><a routerLink="/component/auto-complete" routerLinkActive="active">オートコンプリート</a></li>
            <li><a routerLink="/component/multi-auto-complete" routerLinkActive="active">マルチセレクトオートコンプリート</a></li>
            <li><a routerLink="/component/mask" routerLinkActive="active">マスク</a></li>
            <li><a routerLink="/component/popup" routerLinkActive="active">ポップアップ</a></li>
          </ul>
        </details>
      </li>
    </ul>
  </div>
</div>
