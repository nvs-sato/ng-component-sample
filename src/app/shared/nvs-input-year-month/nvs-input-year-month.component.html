<div class="nvs-year-month" [class.nvs-disabled]="isDisabled" [class.nvs-readonly]="isReadOnly">
  <div class="input-wrap">
    <input
      type="text"
      class="input input-bordered input-sm ym-input"
      [required]="isRequired"
      [disabled]="isDisabled"
      [readonly]="isReadOnly"
      [placeholder]="placeholder"
      [value]="inputText"
      (input)="onInput($event)"
      (focus)="onFocus()"
      (blur)="onBlur()"
      (keydown)="onKeyDown($event)"
    />

    <div class="month-control-wrap">
      <button type="button" class="month-control-btn" [disabled]="isDisabled || isReadOnly" (click)="onClickPrevMonth()" (keydown)="onKeyDown($event)" aria-label="前月へ">
        ◀
      </button>
      <button type="button" class="month-control-btn" [disabled]="isDisabled || isReadOnly" (click)="onClickNowMonth()" (keydown)="onKeyDown($event)" aria-label="今月へ">
        ●
      </button>
      <button type="button" class="month-control-btn" [disabled]="isDisabled || isReadOnly" (click)="onClickNextMonth()" (keydown)="onKeyDown($event)" aria-label="翌月へ">
        ▶
      </button>
    </div>
  </div>

  <div class="picker-pop card bg-base-100 border border-base-300" *ngIf="pickerOpen">
    <div class="card-body p-3">
      <div class="year-header-wrap">
        <button type="button" class="year-header-btn" [disabled]="!canShiftYear(-1)" (click)="onClickPrevYear()" (keydown)="onKeyDown($event)" aria-label="前年へ">
          ◀
        </button>
        <div class="year-label">{{ sentakuYear }}</div>
        <button type="button" class="year-header-btn" [disabled]="!canShiftYear(1)" (click)="onClickNextYear()" (keydown)="onKeyDown($event)" aria-label="翌年へ">
          ▶
        </button>
      </div>

      <div class="month-grid">
        <button
          type="button"
          class="month-grid-btn"
          *ngFor="let month of monthItems"
          [class.is-selected]="month === sentakuMonth"
          [disabled]="isMonthDisabled(month)"
          (click)="onSelectMonth(month)"
          (keydown)="onKeyDown($event)"
        >
          {{ month }}
        </button>
      </div>
    </div>
  </div>
</div>
