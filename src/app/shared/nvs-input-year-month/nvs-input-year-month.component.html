<div class="nvs-year-month" [class.nvs-disabled]="isDisabled" [class.nvs-readonly]="isReadOnly">
  <div class="input-wrap">
    <input
      type="text"
      class="input input-bordered input-sm ym-input"
      [required]="isRequired"
      [disabled]="isDisabled"
      [readonly]="isReadOnly"
      [placeholder]="placeholder"
      [value]="inputText"
      (input)="onInput($event)"
      (focus)="onFocus()"
      (blur)="onBlur()"
      (keydown)="onKeyDown($event)"
    />
    <button
      type="button"
      class="picker-icon-btn"
      tabindex="-1"
      [disabled]="isDisabled || isReadOnly"
      (click)="togglePicker()"
      (keydown)="onKeyDown($event)"
      aria-label="年月選択を開く"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="picker-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
    </button>
  </div>

  <div class="picker-pop card bg-base-100 border border-base-300" *ngIf="pickerOpen">
    <div class="card-body p-3">
      <div class="picker-row">
        <select class="select select-sm select-bordered" [(ngModel)]="sentakuYear" (ngModelChange)="onChangeYear($event)" (keydown)="onKeyDown($event)">
          <option *ngFor="let year of yearList" [ngValue]="year">{{ year }}</option>
        </select>
        <span class="separator">/</span>
        <select class="select select-sm select-bordered" [(ngModel)]="sentakuMonth" (ngModelChange)="onChangeMonth($event)" (keydown)="onKeyDown($event)">
          <option *ngFor="let month of monthList" [ngValue]="month">{{ month }}</option>
        </select>
      </div>
    </div>
  </div>
</div>
