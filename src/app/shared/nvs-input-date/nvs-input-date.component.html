<div class="nvs-date" [class.nvs-disabled]="isDisabled" [class.nvs-readonly]="isReadOnly">
  <div class="input-wrap">
    <input
      type="text"
      class="input input-bordered input-sm date-input"
      [required]="isRequired"
      [disabled]="isDisabled"
      [readonly]="isReadOnly"
      [placeholder]="placeholder"
      [value]="inputText"
      (input)="onInput($event)"
      (focus)="onFocus()"
      (blur)="onBlur()"
      (keydown)="onKeyDown($event)"
    />
    <button
      type="button"
      class="calendar-icon-btn"
      tabindex="-1"
      [disabled]="isDisabled || isReadOnly"
      (click)="toggleCalendar()"
      (keydown)="onKeyDown($event)"
      aria-label="カレンダーを開く"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="calendar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
    </button>
  </div>

  <div class="calendar-pop card bg-base-100 border border-base-300" *ngIf="calendarOpen">
    <div class="card-body p-3">
      <div class="calendar-head">
        <button type="button" class="btn btn-xs" (click)="prevMonth()">&lt;</button>
        <span>{{ monthTitle }}</span>
        <button type="button" class="btn btn-xs" (click)="nextMonth()">&gt;</button>
      </div>

      <div class="calendar-grid week-row">
        <div class="week-cell" *ngFor="let week of weekLabelList">{{ week }}</div>
      </div>

      <div class="calendar-grid day-row">
        <button
          type="button"
          class="btn btn-ghost btn-xs day-cell"
          *ngFor="let cell of calendarCellList"
          [class.other-month]="!cell.tsukiNai"
          [class.is-selected]="cell.sentaku"
          [class.is-active]="isSameDate(cell.hiduke, activeCalendarDate)"
          [disabled]="cell.muko"
          (mousedown)="onMouseDownDate($event, cell)"
          (click)="onClickDate(cell)"
        >
          {{ cell.hiduke.getDate() }}
        </button>
      </div>
    </div>
  </div>
</div>
